<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据同步终端 | Akasha Sync</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=Noto+Serif+SC:wght@400;600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.staticfile.net/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Third Party Scripts -->
    <!-- QRCode.js -->
    <script src="https://cdn.staticfile.net/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Geetest v3 SDK -->
    <script src="https://static.geetest.com/static/tools/gt.js"></script>

    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
    <style>
        .sync-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 40px;
            text-align: center;
        }
        .sync-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
            text-align: left;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .qr-btn {
            background: rgba(var(--dendro-primary-rgb), 0.1);
            border: 1px solid var(--dendro-primary);
            color: var(--dendro-primary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .qr-btn:hover {
            background: var(--dendro-primary);
            color: #fff;
            box-shadow: 0 0 10px var(--dendro-bg-glow);
        }
        .form-group input, .form-group textarea, .form-group select {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            color: var(--text-primary);
            font-family: var(--font-cyber);
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--dendro-primary);
            box-shadow: 0 0 15px rgba(var(--dendro-primary-rgb), 0.2);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .btn-sync {
            background: linear-gradient(135deg, var(--dendro-primary) 0%, rgba(var(--dendro-primary-rgb), 0.5) 100%);
            border: 1px solid var(--dendro-light);
            padding: 16px;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            box-shadow: 0 4px 15px rgba(var(--dendro-primary-rgb), 0.3);
        }
        .btn-sync:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(var(--dendro-primary-rgb), 0.5);
        }
        .btn-sync:disabled {
            background: #555;
            border-color: #777;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .log-box {
            margin-top: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            text-align: left;
            font-family: var(--font-cyber);
            font-size: 0.85rem;
            color: var(--dendro-accent);
            display: none;
        }
        .log-box p {
            margin: 5px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }
        .header-back {
            position: absolute;
            top: 30px;
            left: 30px;
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: bold;
            transition: color 0.3s ease;
            z-index: 10;
        }
        .header-back:hover {
            color: var(--text-primary);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--dendro-primary);
            box-shadow: 0 0 30px var(--dendro-bg-glow);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            position: relative;
            max-width: 350px;
            width: 90%;
        }
        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
        }
        .modal-close:hover { color: white; }
        .qr-wrapper {
            position: relative;
            display: inline-block;
            margin: 20px auto;
            padding: 10px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(var(--dendro-primary-rgb), 0.3);
        }
        #qrcode {
            margin: 0;
            padding: 0;
            display: block;
        }
        .qr-scanner-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: var(--dendro-primary);
            box-shadow: 0 0 10px var(--dendro-primary), 0 0 20px var(--dendro-primary);
            animation: qrScan 2.5s ease-in-out infinite;
            display: none;
        }
        @keyframes qrScan {
            0% { top: -5%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 105%; opacity: 0; }
        }
        .qr-status {
            color: var(--dendro-primary);
            font-weight: bold;
            margin-top: 10px;
        }
        
        #geetest-container {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    
    <div class="hud-grid"></div>
    <div id="particles-js" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;"></div>
    
    <a href="index.html" class="header-back"><i class="fa-solid fa-angle-left"></i> 返回虚空终端</a>

    <div class="sync-container card glass" style="margin: 100px auto; width: 100%; max-width: 600px; position:relative; z-index:2;">
        <h2><i class="fa-solid fa-satellite-dish"></i> 虚空终端数据同步</h2>
        <p style="color: var(--text-secondary); margin-top: 10px;">通过米游社 Cookie 直接连接世界树，同步您的真实角色数据。</p>
        
        <form class="sync-form" id="syncForm">
            <div class="form-group">
                <label for="uid">游戏 UID (必填)</label>
                <input type="text" id="uid" placeholder="例如：100000000" required>
            </div>
            
            <div class="form-group">
                <label for="server">服务器</label>
                <select id="server">
                    <option value="cn_gf01">天空岛 (官服)</option>
                    <option value="cn_qd01">世界树 (B服)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="cookie">
                    <span>米游社 Cookie</span>
                    <button type="button" class="qr-btn" id="showQRBtn"><i class="fa-solid fa-qrcode"></i> 扫码自动获取</button>
                </label>
                <textarea id="cookie" placeholder="请在此粘贴您的米游社网页 Cookie，或点击右侧扫码自动获取..." required></textarea>
            </div>
            
            <button type="submit" class="btn-sync" id="syncBtn">
                <i class="fa-solid fa-rotate"></i> 开始极速同步
            </button>
        </form>

        <div class="log-box" id="logBox">
            <p>> 准备连接世界树网络...</p>
        </div>
    </div>
    </div>

    <!-- QR Login Modal -->
    <div class="modal-overlay" id="qrModal">
        <div class="modal-content">
            <i class="fa-solid fa-xmark modal-close" id="closeQRBtn"></i>
            <h3 style="color: white; margin-top: 0;">米游社 App 扫码</h3>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">请使用米游社 App 扫描下方二维码</p>
            <div class="qr-wrapper">
                <div id="qrcode"></div>
                <div class="qr-scanner-line" id="qrScannerLine"></div>
            </div>
            <div class="qr-status" id="qrStatus">正在生成二维码...</div>
        </div>
    </div>

    <!-- Geetest Container -->
    <div id="geetest-container">
        <h4 style="margin-top:0; color:#333; text-align:center;">安全验证</h4>
        <div id="captcha-box"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Init Particles
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 50, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#10b981" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } },
                "size": { "value": 3, "random": true, "anim": { "enable": true, "speed": 2, "size_min": 0.1, "sync": false } },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 1, "direction": "top", "random": true, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": { "detect_on": "canvas", "events": { "onhover": { "enable": false }, "onclick": { "enable": false }, "resize": true } },
            "retina_detect": true
        });

        const syncForm = document.getElementById('syncForm');
        const syncBtn = document.getElementById('syncBtn');
        const logBox = document.getElementById('logBox');
        
        // QR Elements
        const showQRBtn = document.getElementById('showQRBtn');
        const qrModal = document.getElementById('qrModal');
        const closeQRBtn = document.getElementById('closeQRBtn');
        const qrcodeDiv = document.getElementById('qrcode');
        const qrStatus = document.getElementById('qrStatus');

        let qrPollInterval = null;
        let qrQrcodeObj = null;

        // Auto-fill from localStorage
        window.addEventListener('DOMContentLoaded', () => {
            const savedCookie = localStorage.getItem('genshinCookie');
            const savedUid = localStorage.getItem('genshinSyncUid');
            if (savedCookie) document.getElementById('cookie').value = savedCookie;
            if (savedUid) document.getElementById('uid').value = savedUid;
        });

        function addLog(msg, isError = false) {
            const p = document.createElement('p');
            p.textContent = `> ${msg}`;
            if (isError) p.style.color = '#ef4444';
            logBox.appendChild(p);
            logBox.scrollTop = logBox.scrollHeight;
        }

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // ---------------------------------------------------------
        // GEETEST HANDLER
        // ---------------------------------------------------------
        let captchaInstance = null;
        function handleGeetest(gt, challenge) {
            return new Promise((resolve, reject) => {
                document.getElementById('geetest-container').style.display = 'block';
                document.getElementById('captcha-box').innerHTML = '';
                
                initGeetest({
                    gt: gt,
                    challenge: challenge,
                    offline: false,
                    new_captcha: true,
                    product: "popup",
                    width: "300px"
                }, function (captchaObj) {
                    captchaInstance = captchaObj;
                    captchaObj.appendTo("#captcha-box");
                    captchaObj.onReady(function () {
                        captchaObj.verify();
                    });
                    captchaObj.onSuccess(function () {
                        const result = captchaObj.getValidate();
                        document.getElementById('geetest-container').style.display = 'none';
                        captchaObj.destroy();
                        resolve({
                            geetest_challenge: result.geetest_challenge,
                            geetest_validate: result.geetest_validate,
                            geetest_seccode: result.geetest_seccode
                        });
                    });
                    captchaObj.onError(function (err) {
                        document.getElementById('geetest-container').style.display = 'none';
                        captchaObj.destroy();
                        reject(err);
                    });
                    captchaObj.onClose(function () {
                        document.getElementById('geetest-container').style.display = 'none';
                        captchaObj.destroy();
                        reject(new Error("用户关闭了滑块验证"));
                    });
                });
            });
        }

        // ---------------------------------------------------------
        // QR LOGIN LOGIC
        // ---------------------------------------------------------
        showQRBtn.addEventListener('click', async () => {
            qrModal.style.display = 'flex';
            qrcodeDiv.innerHTML = '';
            qrStatus.textContent = '正在获取二维码...';
            qrStatus.style.color = 'var(--dendro-primary)';
            if (qrPollInterval) clearInterval(qrPollInterval);

            try {
                let res = await fetch('/api/createQR', { method: 'POST' });
                let data = await res.json();

                // Check Risk
                if (data.is_risk) {
                    qrStatus.textContent = '触发安全风控，请滑动验证...';
                    const gtResult = await handleGeetest(data.gt, data.challenge);
                    // Currently createQR doesn't accept gt headers directly in our simple implementation, 
                    // Wait, Vercel IP might always be blocked. If createQR fails, the user might need to manually input.
                    // To keep it robust, let's assume createQR usually works since it's just generating a ticket.
                }

                if (data.success) {
                    qrQrcodeObj = new QRCode(qrcodeDiv, {
                        text: data.url,
                        width: 150,
                        height: 150,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.M
                    });
                    qrStatus.textContent = '请使用米游社 App 扫码';
                    document.getElementById('qrScannerLine').style.display = 'block';
                    
                    pollQRStatus(data.ticket, data.device);
                } else {
                    qrStatus.textContent = '获取失败: ' + data.message;
                    qrStatus.style.color = '#ef4444';
                }
            } catch (err) {
                qrStatus.textContent = '网络错误';
                qrStatus.style.color = '#ef4444';
            }
        });

        closeQRBtn.addEventListener('click', () => {
            qrModal.style.display = 'none';
            if (qrPollInterval) clearInterval(qrPollInterval);
        });

        function pollQRStatus(ticket, device) {
            qrPollInterval = setInterval(async () => {
                try {
                    const res = await fetch('/api/checkQR', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ticket, device })
                    });
                    const data = await res.json();
                    
                    if (data.is_risk) {
                        clearInterval(qrPollInterval);
                        qrStatus.textContent = '验证被拦截，请手动输入Cookie';
                        return;
                    }

                    if (data.success) {
                        if (data.stat === 'Scanned') {
                            qrStatus.textContent = '已扫描，请在手机上确认登录';
                            qrStatus.style.color = '#f59e0b';
                        } else if (data.stat === 'Confirmed') {
                            clearInterval(qrPollInterval);
                            qrStatus.textContent = '登录成功！正在提取凭证...';
                            qrStatus.style.color = '#10b981';
                            document.getElementById('qrScannerLine').style.display = 'none';
                            
                            // Construct Cookie
                            let cookieStr = `account_id=${data.uid}; cookie_token=${data.token};`;
                            document.getElementById('cookie').value = cookieStr;
                            localStorage.setItem('genshinCookie', cookieStr);
                            
                            setTimeout(() => {
                                qrModal.style.display = 'none';
                                addLog('✅ 扫码登录成功，已自动填充 Cookie！');
                            }, 1000);
                        }
                    }
                } catch (e) {
                    console.error("Polling error", e);
                }
            }, 2500);
        }

        // ---------------------------------------------------------
        // DATA SYNC LOGIC (WITH CONCURRENCY & GEETEST)
        // ---------------------------------------------------------
        
        async function fetchWithGeetest(url, bodyData) {
            let res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bodyData)
            });
            let data = await res.json();

            if (data.is_risk) {
                addLog('🛡️ 触发米游社风控拦截，请完成验证模块...');
                try {
                    const gtResult = await handleGeetest(data.gt, data.challenge);
                    addLog('✅ 验证通过，继续请求...');
                    // Retry with geetest tokens
                    res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...bodyData, ...gtResult })
                    });
                    data = await res.json();
                } catch (e) {
                    throw new Error("滑块验证失败或取消");
                }
            }
            return data;
        }

        syncForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const uid = document.getElementById('uid').value.trim();
            const server = document.getElementById('server').value;
            const cookie = document.getElementById('cookie').value.trim();
            
            if (!uid || !cookie) return;

            localStorage.setItem('genshinCookie', cookie);
            localStorage.setItem('genshinSyncUid', uid);

            syncBtn.disabled = true;
            syncBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 极速同步中，请勿关闭页面...';
            logBox.style.display = 'block';
            logBox.innerHTML = '';
            addLog('🚀 准备连接世界树网络...');

            try {
                addLog('正在获取角色总览列表...');
                const listData = await fetchWithGeetest('/api/getList', { uid, server, cookie });

                if (!listData.success) {
                    throw new Error(listData.message || '获取列表失败');
                }

                const characters = listData.data.list;
                if (!characters || characters.length === 0) {
                    throw new Error('未找到任何角色数据');
                }

                addLog(`✅ 成功获取！共发现 ${characters.length} 名角色。`);
                addLog(`⏳ 开始启动高并发深度读取 (并发数: 5)...`);

                const fullData = {};
                let successCount = 0;
                
                // Concurrency Pool Setup
                const CONCURRENCY = 5;
                let currentIndex = 0;
                let activeRequests = 0;
                let hasError = false;

                const processNext = async () => {
                    if (currentIndex >= characters.length || hasError) return;
                    
                    const idx = currentIndex++;
                    const char = characters[idx];
                    activeRequests++;
                    
                    addLog(`[${idx+1}/${characters.length}] 拉取 [${char.name}]...`);
                    
                    try {
                        // Short delay to stagger requests slightly
                        await sleep(idx * 100); 
                        
                        const detailData = await fetchWithGeetest('/api/getDetail', { uid, server, cookie, character_id: char.id });
                        
                        if (detailData.success) {
                            fullData[char.id] = { basic: char, detail: detailData.data };
                            successCount++;
                        } else {
                            addLog(`⚠️ 读取 [${char.name}] 失败: ${detailData.message}`, true);
                        }
                    } catch (err) {
                        addLog(`⚠️ 读取 [${char.name}] 异常: ${err.message}`, true);
                        if (err.message.includes('滑块验证失败')) {
                            hasError = true; // Stop pool if user cancelled captcha
                        }
                    } finally {
                        activeRequests--;
                        if (activeRequests === 0 && currentIndex >= characters.length) {
                            finalizeSync(characters, fullData);
                        } else {
                            processNext();
                        }
                    }
                };

                for (let i = 0; i < Math.min(CONCURRENCY, characters.length); i++) {
                    processNext();
                }

            } catch (error) {
                addLog(`❌ 连接失败：${error.message}`, true);
                syncBtn.disabled = false;
                syncBtn.innerHTML = '<i class="fa-solid fa-rotate"></i> 重新尝试同步';
            }
        });

        // 3. 数据转换 (Data Transformation)
        function finalizeSync(characters, fullData) {
            addLog(`🎉 同步完成！成功拉取 ${Object.keys(fullData).length} 个角色，正在编译图鉴...`);

            const PROPERTY_MAP = {
                2: "生命值", 3: "生命值%", 4: "基础攻击力", 5: "攻击力",
                6: "攻击力%", 7: "基础防御力", 8: "防御力", 9: "防御力%",
                20: "暴击率", 22: "暴击伤害", 23: "元素充能效率", 26: "治疗加成",
                28: "元素精通", 30: "物理伤害加成", 40: "火元素伤害加成",
                41: "雷元素伤害加成", 42: "水元素伤害加成", 43: "草元素伤害加成",
                44: "风元素伤害加成", 45: "岩元素伤害加成", 46: "冰元素伤害加成",
                2000: "生命值上限", 2001: "攻击力", 2002: "防御力"
            };

            const ELEMENT_MAP = {
                "Anemo": "风", "Pyro": "火", "Hydro": "水", "Cryo": "冰",
                "Electro": "雷", "Geo": "岩", "Dendro": "草"
            };

            const RELIC_POS_NAMES = {
                1: "生之花", 2: "死之羽", 3: "时之沙", 4: "空之杯", 5: "理之冠"
            };

            const charList = [];

            for (const charId in fullData) {
                const data = fullData[charId];
                const basic = data.basic || {};
                const detailList = data.detail?.list || [];
                const detail = detailList.length > 0 ? detailList[0] : {};

                const weapon = detail.base?.weapon || {};
                const relics = detail.relics || [];
                const selectedProps = detail.selected_properties || [];
                const constellations = detail.constellations || [];
                const skillsRaw = detail.skills || [];

                // 命座
                const processedConstellations = constellations.map((cons, idx) => ({
                    id: cons.id || 0,
                    pos: idx + 1,
                    name: cons.name || `第${idx+1}命座`,
                    effect: cons.effect || '暂无描述',
                    icon: cons.icon || '',
                    is_actived: cons.is_actived || false
                }));
                const activatedConst = constellations.filter(c => c.is_actived).length;

                // 圣遗物套装
                const setCount = {};
                const setAffixesMap = {};
                for (const relic of relics) {
                    const setInfo = relic.set || {};
                    const setName = setInfo.name || '散件';
                    setCount[setName] = (setCount[setName] || 0) + 1;
                    if (!setAffixesMap[setName] && setInfo.affixes) {
                        setAffixesMap[setName] = setInfo.affixes;
                    }
                }

                const activeSetEffects = [];
                for (const setName in setCount) {
                    const count = setCount[setName];
                    const affixes = setAffixesMap[setName] || [];
                    for (const affix of affixes) {
                        if (count >= (affix.activation_number || 0)) {
                            activeSetEffects.push({
                                name: setName,
                                activation: affix.activation_number,
                                effect: affix.effect || ''
                            });
                        }
                    }
                }

                // 圣遗物详情
                const processedRelics = relics.map(relic => {
                    const copy = { ...relic };
                    const posId = relic.pos || 1;
                    copy.pos_name_cn = RELIC_POS_NAMES[posId] || relic.pos_name || '未知';
                    
                    copy.processed_subs = (relic.sub_property_list || []).map(sub => ({
                        ...sub,
                        prop_name: PROPERTY_MAP[sub.property_type] || '未知',
                        times: sub.times || 0
                    }));

                    const mainProp = relic.main_property || {};
                    copy.main_prop_name = PROPERTY_MAP[mainProp.property_type] || '未知';
                    copy.main_prop_value = mainProp.value || '0';
                    return copy;
                });

                // 面板属性
                const statsMap = {};
                for (const prop of selectedProps) {
                    if (prop.property_type) {
                        statsMap[prop.property_type] = {
                            final: prop.final || prop.base || '0',
                            base: prop.base || '0'
                        };
                    }
                }

                // 元素伤害
                const elementProps = detail.element_properties || [];
                let elementDamage = "0%";
                const elementTypeMap = {
                    'Pyro': 40, 'Electro': 41, 'Hydro': 42, 'Dendro': 43,
                    'Anemo': 44, 'Geo': 45, 'Cryo': 46
                };
                const targetType = elementTypeMap[basic.element || ''];
                for (const ep of elementProps) {
                    if (ep.property_type === targetType) {
                        elementDamage = ep.final || '0%';
                        break;
                    }
                }

                // 技能
                const skills = skillsRaw.filter(k => k.skill_type === 1);
                
                charList.push({
                    id: parseInt(charId),
                    name: basic.name || '未知',
                    element: ELEMENT_MAP[basic.element || ''] || basic.element || '未知',
                    element_en: basic.element || '',
                    rarity: basic.rarity || 4,
                    level: basic.level || 1,
                    fetter: basic.fetter || 0,
                    icon: basic.icon || '',
                    portrait: detail.base?.image || basic.icon || '',
                    weapon_name: weapon.name || '无',
                    weapon_icon: weapon.icon || '',
                    weapon_rarity: weapon.rarity || 0,
                    weapon_level: weapon.level || 1,
                    weapon_affix: weapon.affix_level || 1,
                    constellation: activatedConst,
                    relics: processedRelics,
                    stats: statsMap,
                    element_damage: elementDamage,
                    active_set_effects: activeSetEffects,
                    skill_normal: skills.length >= 1 ? skills[0] : null,
                    skill_e: skills.length >= 2 ? skills[1] : null,
                    skill_q: skills.length >= 3 ? skills[skills.length - 1] : null,
                    constellations: processedConstellations
                });
            }

            // 保存数据到本地并跳转
            localStorage.setItem('genshinSyncData', JSON.stringify(charList));
            
            setTimeout(() => {
                window.location.href = 'my_account.html';
            }, 1000);
        }
    </script>
</body>
</html>
