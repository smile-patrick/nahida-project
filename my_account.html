<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的角色图鉴 | Akasha Archives</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=Noto+Serif+SC:wght@400;600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.staticfile.net/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: var(--font-sans); 
            min-height: 100vh; 
            color: var(--text-primary);
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 10% 20%, rgba(var(--theme-primary-rgb), 0.08) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(251, 191, 36, 0.04) 0%, transparent 40%), linear-gradient(180deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
            overflow: hidden;
            transition: background-image 0.5s ease;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(var(--theme-primary-rgb), 0.3); border-radius: 4px; transition: background 0.3s ease; }
        ::-webkit-scrollbar-thumb:hover { background: var(--theme-primary); }
        
        /* Akasha Dark Glassmorphism */
        .glass-panel {
            background: rgba(10, 15, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.5);
        }

        .app-wrapper {
            padding: 20px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app { 
            display: flex; height: 100%; width: 100%; max-width: 1600px; 
            border-radius: 24px; overflow: hidden; position: relative; z-index: 10; 
            border: 1px solid rgba(var(--theme-primary-rgb), 0.3);
            box-shadow: 0 0 30px rgba(var(--theme-primary-rgb), 0.1);
        }
        
        .sidebar { 
            width: 340px; 
            display: flex; 
            flex-direction: column; 
            z-index: 20; 
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        .sidebar-header { 
            background: linear-gradient(180deg, rgba(var(--theme-primary-rgb), 0.15) 0%, transparent 100%);
            padding: 30px 24px 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .sidebar-header h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; font-family: 'Share Tech Mono', 'PingFang SC'; text-shadow: 0 0 15px rgba(var(--theme-primary-rgb), 0.6); color: #fff; display:flex; align-items:center; gap:10px;}
        .sidebar-header h2 i { color: var(--theme-primary); }
        .sidebar-header p { font-size: 0.9rem; color: #94a3b8; font-weight:500;}
        .sidebar-actions { margin-top: 15px; display:flex; gap:10px; }
        .sidebar-actions a { 
            color: var(--text-primary); font-size: 0.85rem; text-decoration: none; 
            background: rgba(255,255,255,0.05); padding: 8px 14px; border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.1); transition:all 0.3s;
            display:flex; align-items:center; gap:6px;
        }
        .sidebar-actions a:hover { background: rgba(var(--theme-primary-rgb), 0.2); border-color: var(--theme-primary); transform:translateY(-2px); box-shadow: 0 4px 12px rgba(var(--theme-primary-rgb),0.2);}
        
        .search-box { padding: 16px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .search-box input { 
            width: 100%; padding: 12px 18px; border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; font-size: 14px; outline: none; transition: all 0.3s; 
            background: rgba(0, 0, 0, 0.4); color: #fff; font-family: var(--font-sans);
        }
        .search-box input:focus { border-color: var(--theme-primary); box-shadow: 0 0 15px rgba(var(--theme-primary-rgb), 0.2); background: rgba(0,0,0,0.6); }
        
        .character-list { flex: 1; overflow-y: auto; padding: 16px; scroll-behavior: smooth;}
        .character-item { 
            display: flex; align-items: center; padding: 12px 16px; margin-bottom: 10px; 
            border-radius: 14px; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); 
            position: relative; overflow: hidden; 
        }
        .character-item:hover { transform: translateX(5px); background: rgba(255, 255, 255, 0.05); border-color: rgba(255,255,255,0.1);}
        .character-item.active { 
            background: linear-gradient(90deg, rgba(var(--theme-primary-rgb), 0.2) 0%, rgba(0,0,0,0.5) 100%);
            border-left: 4px solid var(--theme-primary); 
            border-color: rgba(var(--theme-primary-rgb), 0.4); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .char-avatar { 
            width: 56px; height: 56px; border-radius: 50%; overflow: hidden; margin-right: 16px; 
            background: #000; flex-shrink: 0; box-shadow: 0 0 10px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .character-item.active .char-avatar { border-color: var(--theme-primary-light); box-shadow: 0 0 15px rgba(var(--theme-primary-rgb), 0.6); }
        .char-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .char-info { flex: 1; min-width: 0; }
        .char-name { font-weight: 700; font-size: 1.05rem; color: #f1f5f9; transition: color 0.3s ease; letter-spacing:0.5px;}
        .character-item.active .char-name { color: var(--theme-primary-light); text-shadow: 0 0 10px rgba(var(--theme-primary-rgb), 0.5); }
        .char-meta { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; display:flex; align-items:center; gap:8px;}
        .char-element { font-weight: 600; padding:2px 6px; border-radius:4px; background:rgba(0,0,0,0.3);}
        .char-level { font-weight: 500; }
        .char-rarity { font-size: 0.7rem; font-weight: 600; text-shadow: 0 0 5px currentColor; margin-left:auto;}
        .rarity-5 { color: #f59e0b; } .rarity-4 { color: #a855f7; }
        
        .detail-panel { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0; position: relative; scroll-behavior: smooth;}
        
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #64748b; text-align: center; }
        
        /* Premium Hero Card */
        .hero-card { 
            position: relative; overflow: hidden; min-height: 400px;
            display: flex; align-items: flex-end; padding: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .hero-bg {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background-size: cover; background-position: center 20%;
            z-index: 0; opacity: 0.6; filter: blur(2px) saturate(1.2);
            mask-image: linear-gradient(to bottom, black 20%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 20%, transparent 100%);
            transition: background-image 0.5s ease;
        }
        .hero-bg::after {
            content: ''; position:absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.8) 100%);
        }
        .hero-inner { display: flex; gap: 32px; align-items: flex-end; position: relative; z-index: 2; width:100%;}
        .hero-portrait { 
            width: 180px; height: 180px; border-radius: 20px; overflow: hidden; flex-shrink: 0;
            background: rgba(0,0,0,0.5); box-shadow: 0 10px 30px rgba(var(--theme-primary-rgb), 0.4); 
            border: 2px solid rgba(255,255,255,0.2); 
            transform: translateY(20px);
        }
        .hero-portrait img { width: 100%; height: 100%; object-fit: cover; }
        .hero-info { flex: 1; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-bottom: 10px;}
        .hero-name-wrapper { display:flex; align-items:baseline; gap:16px; margin-bottom: 16px;}
        .hero-name { font-size: 3rem; font-weight: 900; font-family: 'Noto Serif SC', serif; letter-spacing: 4px; text-shadow: 0 0 20px rgba(var(--theme-primary-rgb), 0.8);}
        .hero-tags { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .element-tag { padding: 6px 16px; border-radius: 30px; background: rgba(0,0,0,0.6); border: 1px solid rgba(var(--theme-primary-rgb), 0.6); font-weight: 700; font-size: 0.9rem; color: var(--theme-primary-light); box-shadow: 0 0 15px rgba(var(--theme-primary-rgb), 0.3) inset; display:flex; align-items:center; gap:6px;}
        .rarity-tag { padding: 6px 16px; border-radius: 30px; background: rgba(245, 158, 11, 0.2); border: 1px solid #f59e0b; color: #fcd34d; font-weight: 700; letter-spacing:2px;}
        .level-tag { padding: 6px 16px; border-radius: 30px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); font-weight: 700; }
        
        .weapon-card { 
            background: rgba(0, 0, 0, 0.5); backdrop-filter:blur(10px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 12px 20px; display: inline-flex; align-items: center; gap: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .weapon-icon { width: 50px; height: 50px; border-radius: 12px; background: rgba(255,255,255,0.1); padding: 4px; }
        .weapon-icon img { width: 100%; height: 100%; object-fit: contain; }
        
        .content-layout { padding: 40px; }
        .two-columns { display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; }
        
        .section-title { 
            font-size: 1.3rem; font-weight: 800; margin-bottom: 24px; padding-left: 16px; 
            border-left: 4px solid var(--theme-primary); color: #fff; 
            font-family: 'Share Tech Mono', sans-serif; letter-spacing:1px;
            text-shadow: 0 0 15px rgba(var(--theme-primary-rgb), 0.6);
            display:flex; align-items:center; gap:10px;
        }
        
        .relics-list { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .relic-card { 
            background: rgba(20, 30, 40, 0.6); backdrop-filter: blur(12px);
            border-radius: 24px; display: flex; gap: 24px; padding: 24px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 8px 32px rgba(0,0,0,0.2); 
            border: 1px solid rgba(255, 255, 255, 0.06); 
            position:relative; overflow:hidden;
        }
        .relic-card::before {
            content:''; position:absolute; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%); pointer-events:none;
        }
        .relic-card:hover { border-color: rgba(var(--theme-primary-rgb), 0.5); box-shadow: 0 12px 40px rgba(var(--theme-primary-rgb), 0.15); transform: translateY(-4px); background: rgba(30, 40, 50, 0.6);}
        .relic-icon-area { width: 90px; height: 90px; flex-shrink: 0; position:relative;}
        .relic-icon { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; background: rgba(0,0,0,0.4); border: 2px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.3);}
        .relic-pos { position:absolute; bottom:-10px; left:50%; transform:translateX(-50%); font-size: 0.75rem; padding: 4px 12px; border-radius: 12px; background: var(--bg-dark); color: var(--theme-primary-light); border: 1px solid var(--theme-primary); font-weight:700; white-space:nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.5);}
        .relic-info { flex: 1; min-width: 0; z-index:1;}
        .relic-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 16px; border-bottom:1px dashed rgba(255,255,255,0.1); padding-bottom:12px;}
        .relic-name { font-weight: 800; font-size: 1.15rem; color: #f8fafc; }
        .relic-set { color: #94a3b8; font-size: 0.85rem; font-weight:500;}
        .relic-main { 
            padding: 12px 16px; border-radius: 14px; margin-bottom: 16px; display: flex; 
            justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
        }
        .main-label { font-weight: 600; color: #94a3b8; font-size: 0.9rem; }
        .main-value { font-weight: 800; font-size: 1.1rem; color: var(--theme-primary-light); text-shadow: 0 0 10px rgba(var(--theme-primary-rgb), 0.5); }
        .relic-subs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .sub-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 14px; border-radius: 10px; font-size: 0.9rem; 
            background: rgba(255,255,255,0.03); border:1px solid transparent;
            transition: background 0.2s;
        }
        .sub-row:hover { background: rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.1); }
        .sub-name { color: #cbd5e1; font-weight: 600; }
        .sub-value { font-weight: 700; color: #fff; }
        .sub-times { font-size: 0.75rem; font-weight: 800; padding: 2px 8px; border-radius: 6px; }
        .sub-times-0 { background: rgba(255,255,255,0.1); color: #94a3b8; }
        .sub-times-1 { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .sub-times-2 { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .sub-times-3 { background: rgba(168, 85, 247, 0.2); color: #c084fc; }
        .sub-times-4, .sub-times-5 { background: rgba(245, 158, 11, 0.2); color: #fbbf24; box-shadow: 0 0 10px rgba(245, 158, 11, 0.3);}
        
        .stats-card { background: rgba(20, 30, 40, 0.6); backdrop-filter: blur(12px); border-radius: 24px; padding: 28px; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .stats-list { display: flex; flex-direction: column; gap: 14px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .stat-row:last-child { border-bottom: none; padding-bottom: 0; }
        .stat-name { font-weight: 600; color: #cbd5e1; display:flex; align-items:center; gap:8px;}
        .stat-value { font-weight: 800; font-size: 1.1rem; color: #fff; font-family: 'Share Tech Mono';}
        .stat-highlight { font-size: 1.25rem; color: var(--theme-primary-light); text-shadow: 0 0 15px rgba(var(--theme-primary-rgb), 0.6); }
        
        .set-effect-card { 
            background: rgba(0,0,0,0.4); border-radius: 20px; padding: 20px; 
            margin-bottom: 24px; border-left: 5px solid var(--theme-primary); 
            border-top: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .set-effect-title { font-weight: 800; color: var(--theme-primary-light); margin-bottom: 10px; font-size: 1rem; display:flex; align-items:center; gap:8px;}
        .set-effect-desc { font-size: 0.85rem; color: #94a3b8; line-height: 1.7; font-weight:500;}
        
        .skills-card { background: rgba(20, 30, 40, 0.6); backdrop-filter: blur(12px); border-radius: 24px; padding: 28px; margin-top: 24px; border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 8px 32px rgba(0,0,0,0.2);}
        .skill-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .skill-item:last-child { border-bottom: none; padding-bottom: 0; }
        .skill-name { font-weight: 700; color: #e2e8f0; font-size:1.05rem; display:flex; align-items:center; gap:10px;}
        .skill-level { font-weight: 800; color: var(--theme-primary-light); background: rgba(var(--theme-primary-rgb), 0.15); padding: 4px 14px; border-radius: 10px; border: 1px solid rgba(var(--theme-primary-rgb),0.3); font-size: 0.9rem;}
        
        /* 命座样式 */
        .constellations-section { margin-top: 40px; padding-top:40px; border-top:1px solid rgba(255,255,255,0.05);}
        .constellation-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 24px; }
        .constellation-card { 
            background: rgba(20, 30, 40, 0.5); border-radius: 24px; padding: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.05); position: relative; overflow: hidden; 
            transition: all 0.3s;
        }
        .constellation-card.activated { 
            background: linear-gradient(135deg, rgba(20, 30, 40, 0.9) 0%, rgba(var(--theme-primary-rgb), 0.1) 100%); 
            border-left: 4px solid var(--theme-primary); 
            border-color: rgba(var(--theme-primary-rgb), 0.3);
            box-shadow: 0 8px 25px rgba(var(--theme-primary-rgb), 0.1);
        }
        .constellation-card.inactive { opacity: 0.6; filter: grayscale(0.8); }
        .constellation-card.activated:hover { transform:translateY(-5px); box-shadow: 0 12px 30px rgba(var(--theme-primary-rgb), 0.2); border-color: rgba(var(--theme-primary-rgb), 0.6);}
        .constellation-header { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; }
        .constellation-icon { 
            width: 60px; height: 60px; border-radius: 16px; background: rgba(0,0,0,0.6); 
            display: flex; align-items: center; justify-content: center; font-size: 1.6rem; 
            border: 2px solid rgba(255,255,255,0.1); flex-shrink:0;
        }
        .constellation-card.activated .constellation-icon { 
            background: rgba(var(--theme-primary-rgb), 0.2); color: var(--theme-primary-light); 
            border-color: var(--theme-primary); box-shadow: 0 0 20px rgba(var(--theme-primary-rgb), 0.5) inset; 
        }
        .constellation-card.inactive .constellation-icon { color: #64748b; }
        .constellation-info { flex: 1; }
        .constellation-name { font-weight: 800; font-size: 1.1rem; color: #f8fafc; }
        .constellation-card.activated .constellation-name { color: var(--theme-primary-light); text-shadow: 0 0 10px rgba(var(--theme-primary-rgb), 0.4);}
        .constellation-card.inactive .constellation-name { color: #94a3b8; }
        .constellation-badge { font-size: 0.75rem; padding: 4px 12px; border-radius: 8px; background: rgba(255,255,255,0.1); display: inline-block; margin-top: 8px; font-weight: 800; letter-spacing:1px;}
        .constellation-card.activated .constellation-badge { background: var(--theme-primary); color: #fff; box-shadow: 0 0 15px rgba(var(--theme-primary-rgb), 0.6); }
        .constellation-card.inactive .constellation-badge { background: rgba(0,0,0,0.4); color: #64748b; }
        .constellation-effect { font-size: 0.9rem; line-height: 1.7; color: #94a3b8; max-height: 140px; overflow-y: auto; padding-right: 8px; font-weight:500;}
        .constellation-card.activated .constellation-effect { color: #cbd5e1; }
        
        .fade-in-up { animation: fadeInUp 0.5s ease forwards; opacity:0; transform:translateY(20px); }
        @keyframes fadeInUp { to { opacity:1; transform:translateY(0); } }

        @media (max-width: 992px) { 
            .app { flex-direction: column; height: auto; overflow: visible;} 
            .sidebar { width: 100%; max-height: 350px; border-right:none; border-bottom:1px solid rgba(255,255,255,0.1);} 
            .detail-panel { overflow: visible;} 
            .two-columns { grid-template-columns: 1fr; } 
            .stats-section { order: 1; } 
            .relics-section { order: 2; }
            .relic-card { flex-direction: column; align-items: center; text-align: left; } 
            .relic-pos { position:static; transform:none; margin-top:10px; display:inline-block;}
            .relic-subs { grid-template-columns: 1fr; }
        }
        footer { margin-top: 60px; padding: 30px; text-align: center; font-size: 0.85rem; color: #475569; border-top: 1px solid rgba(255,255,255,0.05); }

        /* Global Loader Animation */
        .app-loader {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg-dark); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        .app-loader i { font-size: 4rem; color: #10b981; filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.5)); margin-bottom: 20px;}
        .loader-text { font-family: var(--font-cyber); font-size: 1.2rem; color: #a7f3d0; letter-spacing: 2px;}
        .app-loader.hidden { opacity: 0; visibility: hidden; }

        /* HUD Background from index */
        .hud-grid {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; pointer-events: none;
            background-image: linear-gradient(rgba(16, 185, 129, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 185, 129, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="appLoader" class="app-loader">
        <i class="fa-solid fa-spinner fa-spin"></i>
        <div class="loader-text">Loading Akasha Archives...</div>
    </div>

    <div class="hud-grid"></div>
    <div id="particles-js" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;"></div>
    <div class="app-wrapper" style="position:relative; z-index:2;">
        <div class="app glass-panel">
            <div class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-address-card"></i> 角色库</h2>
                <p id="charCount">0 位角色档案</p>
                <div class="sidebar-actions">
                    <a href="sync.html"><i class="fa-solid fa-rotate"></i> 数据同步</a>
                    <a href="index.html"><i class="fa-solid fa-house"></i> 回到首页</a>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="输入名称检索档案...">
            </div>
            <div class="character-list" id="characterList"></div>
        </div>
        <div class="detail-panel" id="detailPanel">
            <div class="empty-state">
                <div style="font-size: 48px; margin-bottom: 20px; color: var(--dendro-primary); text-shadow: 0 0 20px var(--dendro-bg-glow);"><i class="fa-solid fa-database"></i></div>
                <div style="font-size: 18px; font-weight: 500; color: #f1f5f9;">数据加载中或未同步</div>
                <div style="font-size: 14px; margin-top: 12px;"><a href="sync.html" style="color: var(--dendro-primary); text-decoration: none; border: 1px solid var(--dendro-primary); padding: 6px 15px; border-radius: 20px;">点击去同步数据</a></div>
            </div>
        </div>
    </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#10b981" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.4, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } },
                "size": { "value": 4, "random": true, "anim": { "enable": true, "speed": 2, "size_min": 0.1, "sync": false } },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 1.5, "direction": "top", "random": true, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": { "detect_on": "canvas", "events": { "onhover": { "enable": false }, "onclick": { "enable": false }, "resize": true } },
            "retina_detect": true
        });

        const rawData = localStorage.getItem('genshinSyncData');
        const charactersData = rawData ? JSON.parse(rawData) : [];
        
        document.getElementById('charCount').textContent = `共收录 ${charactersData.length} 位角色档案`;

        const elementColors = {
            "风": "#34d399", "火": "#f87171", "水": "#60a5fa",
            "冰": "#93c5fd", "雷": "#c084fc", "岩": "#fbbf24", "草": "#10b981"
        };
        const elementRgbColors = {
            "风": "52, 211, 153", "火": "248, 113, 113", "水": "96, 165, 250",
            "冰": "147, 197, 253", "雷": "192, 132, 252", "岩": "251, 191, 36", "草": "16, 185, 129"
        };
        const elementThemes = {
            "风": { "primary": "#10b981", "primary_light": "#34d399", "primary_dark": "#059669" }, // Anemo/Dendro share green in this terminal
            "火": { "primary": "#ef4444", "primary_light": "#f87171", "primary_dark": "#b91c1c" },
            "水": { "primary": "#3b82f6", "primary_light": "#60a5fa", "primary_dark": "#1d4ed8" },
            "冰": { "primary": "#38bdf8", "primary_light": "#7dd3fc", "primary_dark": "#0284c7" },
            "雷": { "primary": "#a855f7", "primary_light": "#c084fc", "primary_dark": "#7e22ce" },
            "岩": { "primary": "#f59e0b", "primary_light": "#fbbf24", "primary_dark": "#b45309" },
            "草": { "primary": "#10b981", "primary_light": "#34d399", "primary_dark": "#059669" }
        };

        const propertyMap = {
            2: "生命值", 3: "生命值%", 4: "基础攻击力", 5: "攻击力", 6: "攻击力%", 7: "基础防御力", 8: "防御力", 9: "防御力%",
            20: "暴击率", 22: "暴击伤害", 23: "元素充能效率", 26: "治疗加成", 28: "元素精通", 30: "物理伤害加成",
            40: "火元素伤害加成", 41: "雷元素伤害加成", 42: "水元素伤害加成", 43: "草元素伤害加成", 44: "风元素伤害加成",
            45: "岩元素伤害加成", 46: "冰元素伤害加成", 2000: "生命值上限", 2001: "攻击力", 2002: "防御力"
        };
        
        function getElementColor(e) { return elementColors[e] || '#10b981'; }
        function getElementTheme(e) { return elementThemes[e] || elementThemes["草"]; }
        function getElementRgb(e) { return elementRgbColors[e] || '16, 185, 129'; }
        
        function setGlobalTheme(element) {
            const theme = getElementTheme(element);
            const rgb = getElementRgb(element);
            document.documentElement.style.setProperty('--theme-primary', theme.primary);
            document.documentElement.style.setProperty('--theme-primary-light', theme.primary_light);
            document.documentElement.style.setProperty('--theme-primary-dark', theme.primary_dark);
            document.documentElement.style.setProperty('--theme-primary-rgb', rgb);
            
            // Note: The rest is handled by CSS variables seamlessly!
        }
        
        function getRarityClass(r) { return r === 5 ? 'rarity-5' : 'rarity-4'; }
        function getRarityStars(r) { return r === 5 ? '★★★★★' : '★★★★'; }
        function getTimesClass(times) {
            if (times === 0) return 'sub-times-0';
            if (times === 1) return 'sub-times-1';
            if (times === 2) return 'sub-times-2';
            if (times === 3) return 'sub-times-3';
            if (times === 4) return 'sub-times-4';
            return 'sub-times-5';
        }
        function renderCharacterList(filterText) {
            filterText = filterText || '';
            const container = document.getElementById('characterList');
            const filtered = charactersData.filter(c => c.name.includes(filterText));
            container.innerHTML = filtered.map(char => `
                <div class="character-item" data-id="${char.id}">
                    <div class="char-avatar"><img src="${char.icon}" onerror="this.style.display='none'"></div>
                    <div class="char-info">
                        <div class="char-name">${char.name}</div>
                        <div class="char-meta">
                            <span class="char-element" style="color: ${getElementColor(char.element)}; background: rgba(${getElementRgb(char.element)}, 0.15)">${char.element}</span>
                            <span class="char-level">Lv.${char.level}</span>
                        </div>
                    </div>
                    <div class="char-rarity ${getRarityClass(char.rarity)}">${getRarityStars(char.rarity)}</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.character-item').forEach(el => {
                el.addEventListener('click', () => selectCharacter(parseInt(el.dataset.id)));
            });
        }
        
        function selectCharacter(charId) {
            document.querySelectorAll('.character-item').forEach(el => el.classList.remove('active'));
            const selectedEl = document.querySelector(`.character-item[data-id="${charId}"]`);
            if (selectedEl) {
                selectedEl.classList.add('active');
                selectedEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            const char = charactersData.find(c => c.id === charId);
            if (char) {
                setGlobalTheme(char.element);
                renderDetailPanel(char);
            }
        }
        
        function getElementDamageName(element) {
            const names = { '火':'火元素伤害加成', '水':'水元素伤害加成', '风':'风元素伤害加成', '雷':'雷元素伤害加成', '草':'草元素伤害加成', '冰':'冰元素伤害加成', '岩':'岩元素伤害加成' };
            return names[element] || '元素伤害加成';
        }
        
        function renderDetailPanel(char) {
            const panel = document.getElementById('detailPanel');
            const elementDamageName = getElementDamageName(char.element);
            
            let relicsHtml = '';
            if (char.relics && char.relics.length > 0) {
                for (const relic of char.relics) {
                    let subsHtml = '';
                    if (relic.processed_subs && relic.processed_subs.length > 0) {
                        for (const sub of relic.processed_subs) {
                            subsHtml += `<div class="sub-row"><div class="sub-left"><span class="sub-name">${sub.prop_name}</span></div><div style="display:flex; align-items:center; gap:8px;"><span class="sub-value">+${sub.value}</span><span class="sub-times ${getTimesClass(sub.times)}">${sub.times > 0 ? '+' + sub.times : '+0'}</span></div></div>`;
                        }
                    }
                    if (subsHtml === '') subsHtml = '<div class="sub-row"><span style="color:#64748b;">暂无副词条</span></div>';

                    relicsHtml += `
                        <div class="relic-card">
                            <div class="relic-icon-area">
                                <img class="relic-icon" src="${relic.icon}" onerror="this.src='https://act-webstatic.mihoyo.com/hk4e/e20200928calculate/item_icon/67c7f6c8/placeholder.png'">
                            </div>
                            <div class="relic-info">
                                <div class="relic-header">
                                    <div>
                                        <span class="relic-name">${relic.name}</span>
                                        <span style="color: #64748b; margin-left: 5px; font-size: 0.8rem;">${relic.set?.name || '散件'}</span>
                                    </div>
                                    <span class="relic-pos">${relic.pos_name_cn}</span>
                                </div>
                                <div class="relic-main">
                                    <span class="main-label">主词条</span>
                                    <span class="main-value">${relic.main_prop_name} +${relic.main_prop_value}</span>
                                </div>
                                <div class="relic-subs">
                                    ${subsHtml}
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
            if (relicsHtml === '') relicsHtml = '<div style="text-align:center; padding:40px; color:#64748b;">暂无圣遗物数据</div>';
            
            let setEffectsHtml = '';
            if (char.active_set_effects && char.active_set_effects.length > 0) {
                for (const effect of char.active_set_effects) {
                    setEffectsHtml += `<div class="set-effect-card"><div class="set-effect-title"><i class="fa-solid fa-layer-group"></i> ${effect.name} · ${effect.activation}件套效果</div><div class="set-effect-desc">${effect.effect}</div></div>`;
                }
            }
            
            let skillsHtml = '';
            if (char.skill_normal) skillsHtml += `<div class="skill-item"><span class="skill-name">🗡️ ${char.skill_normal.name || '普通攻击'}</span><span class="skill-level">Lv.${char.skill_normal.level || 1}</span></div>`;
            if (char.skill_e) skillsHtml += `<div class="skill-item"><span class="skill-name">⚡ ${char.skill_e.name || '元素战技'}</span><span class="skill-level">Lv.${char.skill_e.level || 1}</span></div>`;
            if (char.skill_q) skillsHtml += `<div class="skill-item"><span class="skill-name">✨ ${char.skill_q.name || '元素爆发'}</span><span class="skill-level">Lv.${char.skill_q.level || 1}</span></div>`;
            
            let statsHtml = '';
            const importantStats = [2000, 2001, 2002, 20, 22, 23, 28, 3, 6, 9];
            for (const st of importantStats) {
                if (char.stats[st]) {
                    statsHtml += `<div class="stat-row"><span class="stat-name">${propertyMap[st] || '未知'}</span><span class="stat-value">${char.stats[st].final}</span></div>`;
                }
            }
            if (char.element_damage && char.element_damage !== '0%') {
                statsHtml += `<div class="stat-row"><span class="stat-name">${elementDamageName}</span><span class="stat-value stat-highlight">${char.element_damage}</span></div>`;
            }
            
            let constellationsHtml = '';
            if (char.constellations && char.constellations.length > 0) {
                constellationsHtml = '<div class="constellations-section"><div class="section-title"><i class="fa-solid fa-star"></i> 命之座网络</div><div class="constellation-grid">';
                for (const cons of char.constellations) {
                    const activatedClass = cons.is_actived ? 'activated' : 'inactive';
                    const statusText = cons.is_actived ? '已激活' : '未解锁';
                    let effectText = cons.effect || '暂无描述';
                    effectText = effectText.replace(/<color[^>]*>/g, '').replace(/<\/?color>/g, '').replace(/\\n/g, '<br>');
                    constellationsHtml += `
                        <div class="constellation-card ${activatedClass}">
                            <div class="constellation-header">
                                <div class="constellation-icon"><i class="fa-solid fa-link"></i></div>
                                <div class="constellation-info">
                                    <div class="constellation-name">第${cons.pos}命 · ${cons.name}</div>
                                    <div class="constellation-badge">${statusText}</div>
                                </div>
                            </div>
                            <div class="constellation-effect">${effectText}</div>
                        </div>
                    `;
                }
                constellationsHtml += '</div></div>';
            } else {
                constellationsHtml = '<div class="constellations-section"><div class="section-title"><i class="fa-solid fa-star"></i> 命之座网络</div><div style="text-align:center; padding:40px; color:#64748b;">暂无命座数据</div></div>';
            }
            
            panel.innerHTML = `
                <div class="hero-card fade-in-up" style="animation-delay: 0s;">
                    <div class="hero-bg" style="background-image: url('${char.portrait}')"></div>
                    <div class="hero-inner">
                        <div class="hero-portrait"><img src="${char.portrait}" onerror="this.src='${char.icon}'"></div>
                        <div class="hero-info">
                            <div class="hero-name-wrapper">
                                <div class="hero-name">${char.name}</div>
                                <span class="rarity-tag">${getRarityStars(char.rarity)}</span>
                            </div>
                            <div class="hero-tags">
                                <span class="element-tag"><i class="fa-solid fa-atom"></i> ${char.element}</span>
                                <span class="level-tag">Lv.${char.level}</span>
                                <span class="level-tag">好感 ${char.fetter}</span>
                                <span class="level-tag">命座 ${char.constellation}/6</span>
                            </div>
                            <div class="weapon-card">
                                <div class="weapon-icon"><img src="${char.weapon_icon}" onerror="this.style.display='none'"></div>
                                <div><div style="font-weight:800; font-size:1.15rem; color: #fff;">${char.weapon_name}</div><div style="font-size:0.85rem; color:#94a3b8; margin-top: 4px; font-weight:600;">Lv.${char.weapon_level} · 精炼 ${char.weapon_affix}</div></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="content-layout">
                    <div class="two-columns fade-in-up" style="animation-delay: 0.1s;">
                        <div class="stats-section">
                            <div class="section-title"><i class="fa-solid fa-chart-pie"></i> 面板属性</div>
                            <div class="stats-card"><div class="stats-list">${statsHtml || '<div style="text-align:center; color:#64748b;">暂无数据</div>'}</div></div>
                            ${skillsHtml ? `<div class="skills-card"><div class="skills-title"><i class="fa-solid fa-bolt"></i> 核心天赋</div>${skillsHtml}</div>` : ''}
                        </div>
                        <div class="relics-section">
                            <div class="section-title"><i class="fa-solid fa-gem"></i> 圣遗物档案</div>
                            ${setEffectsHtml}
                            <div class="relics-list">${relicsHtml}</div>
                        </div>
                    </div>
                    <div class="fade-in-up" style="animation-delay: 0.2s;">
                        ${constellationsHtml}
                    </div>
                    <footer class="fade-in-up" style="animation-delay: 0.3s;">Akasha Terminal Database | 数据来源：米哈游官方接口<br>System Version: 3.0 | UI Designed for Night Mode</footer>
                </div>
            `;
        }
        
        document.getElementById('searchInput').addEventListener('input', function(e) {
            renderCharacterList(e.target.value);
        });
        
        if (charactersData.length > 0) {
            renderCharacterList('');
            selectCharacter(charactersData[0].id);
        }
        
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('appLoader');
                loader.classList.add('hidden');
                setTimeout(() => loader.style.display = 'none', 800);
            }, 800);
        });
    </script>
</body>
</html>
