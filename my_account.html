<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>我的角色图鉴 | Akasha Archives</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&family=Noto+Serif+SC:wght@400;600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.staticfile.net/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: var(--font-sans); 
            min-height: 100vh; 
            color: var(--text-primary);
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 10% 20%, rgba(var(--dendro-primary-rgb), 0.08) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(251, 191, 36, 0.04) 0%, transparent 40%), linear-gradient(180deg, var(--bg-darker) 0%, var(--bg-dark) 100%);
            overflow: hidden;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-darker); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(var(--theme-primary-rgb), 0.3); border-radius: 4px; transition: background 0.3s ease; }
        ::-webkit-scrollbar-thumb:hover { background: var(--theme-primary); }
        
        /* Akasha Dark Glassmorphism */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(var(--dendro-primary-rgb), 0.05);
        }

        .app-wrapper {
            padding: 40px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app { display: flex; height: 100%; width: 100%; max-width: 1400px; overflow: hidden; position: relative; z-index: 10; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid var(--dendro-primary); }
        
        .sidebar { 
            width: 320px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            z-index: 20; 
            border-right: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
        }
        .sidebar-header { 
            background: linear-gradient(180deg, rgba(var(--theme-primary-rgb), 0.2) 0%, transparent 100%);
            padding: 24px 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .sidebar-header h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; font-family: 'Share Tech Mono', 'PingFang SC'; text-shadow: 0 0 10px rgba(var(--theme-primary-rgb), 0.5); color: #fff;}
        .sidebar-header p { font-size: 0.85rem; color: #94a3b8; }
        .search-box { padding: 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .search-box input { 
            width: 100%; padding: 10px 16px; border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; font-size: 14px; outline: none; transition: all 0.2s; 
            background: rgba(0, 0, 0, 0.3); color: #fff;
        }
        .search-box input:focus { border-color: var(--theme-primary, #10b981); box-shadow: 0 0 10px rgba(var(--theme-primary-rgb), 0.3); }
        
        .character-list { flex: 1; overflow-y: auto; padding: 12px; }
        .character-item { 
            display: flex; align-items: center; padding: 12px; margin-bottom: 8px; 
            border-radius: 16px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); 
            position: relative; overflow: hidden; 
        }
        .character-item:hover { transform: translateX(4px); background: rgba(255, 255, 255, 0.08); }
        .character-item.active { 
            background: linear-gradient(90deg, rgba(var(--theme-primary-rgb), 0.2) 0%, rgba(var(--theme-primary-rgb), 0.05) 100%);
            border-left: 4px solid var(--theme-primary, #10b981); 
            border-color: rgba(var(--theme-primary-rgb), 0.5); 
        }
        .char-avatar { 
            width: 52px; height: 52px; border-radius: 50%; overflow: hidden; margin-right: 14px; 
            background: #000; flex-shrink: 0; box-shadow: 0 0 10px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1);
        }
        .character-item.active .char-avatar { border-color: var(--theme-primary); box-shadow: 0 0 15px rgba(var(--theme-primary-rgb), 0.6); }
        .char-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .char-info { flex: 1; min-width: 0; }
        .char-name { font-weight: 700; font-size: 1rem; color: #f1f5f9; transition: color 0.3s ease; }
        .character-item.active .char-name { color: var(--theme-primary-light); text-shadow: 0 0 8px rgba(var(--theme-primary-rgb), 0.4); }
        .char-element { font-size: 0.7rem; margin-top: 4px; font-weight: 500; }
        .char-level { font-size: 0.7rem; color: #64748b; margin-top: 2px; }
        .char-rarity { font-size: 0.7rem; font-weight: 600; text-shadow: 0 0 5px currentColor;}
        .rarity-5 { color: #f59e0b; } .rarity-4 { color: #a855f7; }
        
        .detail-panel { flex: 1; overflow-y: auto; padding: 24px 32px; transition: background 0.5s ease; position: relative;}
        
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #64748b; text-align: center; }
        
        /* Hero Card */
        .hero-card { 
            border-radius: 24px; padding: 28px; margin-bottom: 28px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(255,255,255,0.1);
            position: relative; overflow: hidden;
        }
        .hero-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(var(--theme-primary-rgb), 0.4) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 0;
        }
        .hero-inner { display: flex; gap: 28px; flex-wrap: wrap; align-items: center; position: relative; z-index: 1; }
        .hero-portrait { 
            width: 150px; height: 150px; border-radius: 24px; overflow: hidden; 
            background: rgba(0,0,0,0.5); box-shadow: 0 0 20px rgba(var(--theme-primary-rgb), 0.5); 
            border: 2px solid rgba(255,255,255,0.2); 
        }
        .hero-portrait img { width: 100%; height: 100%; object-fit: cover; }
        .hero-info { flex: 1; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .hero-name { font-size: 2.2rem; font-weight: 800; margin-bottom: 12px; font-family: 'Noto Serif SC', serif; letter-spacing: 2px;}
        .hero-tags { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
        .element-tag { padding: 6px 18px; border-radius: 8px; background: rgba(0,0,0,0.5); border: 1px solid rgba(var(--theme-primary-rgb), 0.5); font-weight: 600; font-size: 0.85rem; color: var(--theme-primary-light); box-shadow: 0 0 10px rgba(var(--theme-primary-rgb), 0.2) inset;}
        .rarity-tag { padding: 6px 18px; border-radius: 8px; background: rgba(245, 158, 11, 0.2); border: 1px solid #f59e0b; color: #fcd34d; font-weight: 600; }
        .level-tag { padding: 6px 18px; border-radius: 8px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); font-weight: 600; }
        
        .weapon-card { 
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; gap: 18px; 
            flex-wrap: wrap; margin-top: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .weapon-icon { width: 56px; height: 56px; border-radius: 12px; background: rgba(255,255,255,0.1); padding: 4px; }
        .weapon-icon img { width: 100%; height: 100%; object-fit: contain; }
        
        .two-columns { display: flex; gap: 28px; flex-wrap: wrap; flex-direction: row; }
        .relics-section { flex: 2; min-width: 320px; }
        .stats-section { flex: 1.2; min-width: 260px; }
        
        .section-title { 
            font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; padding-left: 12px; 
            border-left: 4px solid var(--theme-primary); color: #f8fafc; 
            font-family: 'Share Tech Mono', sans-serif;
            text-shadow: 0 0 10px rgba(var(--theme-primary-rgb), 0.5);
        }
        
        .relics-list { display: flex; flex-direction: column; gap: 16px; }
        .relic-card { 
            background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(8px);
            border-radius: 20px; display: flex; gap: 20px; padding: 20px; 
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .relic-card:hover { border-color: rgba(var(--theme-primary-rgb), 0.5); box-shadow: 0 0 20px rgba(var(--theme-primary-rgb), 0.15); transform: translateY(-2px); }
        .relic-icon-area { width: 80px; height: 80px; flex-shrink: 0; }
        .relic-icon { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.1); }
        .relic-info { flex: 1; min-width: 0; }
        .relic-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 12px; }
        .relic-name { font-weight: 700; font-size: 1.1rem; color: #f1f5f9; }
        .relic-pos { font-size: 0.75rem; padding: 4px 12px; border-radius: 8px; background: rgba(var(--theme-primary-rgb), 0.2); color: var(--theme-primary-light); border: 1px solid rgba(var(--theme-primary-rgb), 0.3); }
        .relic-main { 
            padding: 10px 14px; border-radius: 12px; margin-bottom: 12px; display: flex; 
            justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);
        }
        .main-label { font-weight: 500; color: #94a3b8; font-size: 0.85rem; }
        .main-value { font-weight: 700; color: var(--theme-primary-light); text-shadow: 0 0 8px rgba(var(--theme-primary-rgb), 0.4); }
        .relic-subs { display: flex; flex-direction: column; gap: 6px; }
        .sub-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; 
            background: rgba(255,255,255,0.02);
        }
        .sub-row:hover { background: rgba(255,255,255,0.05); }
        .sub-name { color: #cbd5e1; font-weight: 500; }
        .sub-value { font-weight: 600; color: #f8fafc; }
        .sub-times { font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
        .sub-times-0 { background: rgba(255,255,255,0.1); color: #94a3b8; }
        .sub-times-1 { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .sub-times-2 { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .sub-times-3 { background: rgba(168, 85, 247, 0.2); color: #c084fc; }
        .sub-times-4, .sub-times-5 { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        
        .stats-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(8px); border-radius: 20px; padding: 24px; border: 1px solid rgba(255,255,255,0.05); }
        .stats-list { display: flex; flex-direction: column; gap: 12px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .stat-row:last-child { border-bottom: none; padding-bottom: 0; }
        .stat-name { font-weight: 500; color: #cbd5e1; }
        .stat-value { font-weight: 700; font-size: 1rem; color: #f8fafc; font-family: 'Share Tech Mono';}
        .stat-highlight { font-size: 1.1rem; color: var(--theme-primary-light); text-shadow: 0 0 10px rgba(var(--theme-primary-rgb), 0.5); }
        
        .set-effect-card { 
            background: rgba(0,0,0,0.3); border-radius: 16px; padding: 16px; 
            margin-top: 20px; border-left: 4px solid var(--theme-primary); 
            border-top: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .set-effect-title { font-weight: 700; color: var(--theme-primary-light); margin-bottom: 8px; font-size: 0.9rem; }
        .set-effect-desc { font-size: 0.75rem; color: #94a3b8; line-height: 1.6; }
        
        .skills-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(8px); border-radius: 20px; padding: 20px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .skills-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 12px; color: #f8fafc; border-left: 3px solid var(--theme-primary); padding-left: 12px; font-family: 'Share Tech Mono'; text-shadow: 0 0 10px rgba(var(--theme-primary-rgb), 0.5); }
        .skill-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed rgba(255,255,255,0.1); }
        .skill-item:last-child { border-bottom: none; padding-bottom: 0; }
        .skill-name { font-weight: 600; color: #cbd5e1; }
        .skill-level { font-weight: 700; color: var(--theme-primary-light); background: rgba(var(--theme-primary-rgb), 0.2); padding: 2px 10px; border-radius: 6px; }
        
        /* 命座样式 */
        .constellations-section { margin-top: 32px; }
        .constellation-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; margin-top: 16px; }
        .constellation-card { 
            background: rgba(30, 41, 59, 0.4); border-radius: 16px; padding: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05); position: relative; overflow: hidden; 
        }
        .constellation-card.activated { 
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(var(--theme-primary-rgb), 0.15) 100%); 
            border-left: 4px solid var(--theme-primary); 
            border-color: rgba(var(--theme-primary-rgb), 0.3);
            box-shadow: 0 4px 20px rgba(var(--theme-primary-rgb), 0.1);
        }
        .constellation-card.inactive { opacity: 0.5; filter: grayscale(0.5); }
        .constellation-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
        .constellation-icon { 
            width: 54px; height: 54px; border-radius: 12px; background: rgba(0,0,0,0.5); 
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem; 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .constellation-card.activated .constellation-icon { 
            background: rgba(var(--theme-primary-rgb), 0.2); color: var(--theme-primary-light); 
            border-color: var(--theme-primary); box-shadow: 0 0 15px rgba(var(--theme-primary-rgb), 0.4) inset; 
        }
        .constellation-card.inactive .constellation-icon { color: #64748b; }
        .constellation-info { flex: 1; }
        .constellation-name { font-weight: 700; font-size: 1.05rem; color: #f8fafc; }
        .constellation-card.activated .constellation-name { color: var(--theme-primary-light); text-shadow: 0 0 8px rgba(var(--theme-primary-rgb), 0.4);}
        .constellation-card.inactive .constellation-name { color: #94a3b8; }
        .constellation-badge { font-size: 0.7rem; padding: 4px 10px; border-radius: 6px; background: rgba(255,255,255,0.1); display: inline-block; margin-top: 6px; font-weight: bold;}
        .constellation-card.activated .constellation-badge { background: var(--theme-primary); color: #fff; box-shadow: 0 0 10px rgba(var(--theme-primary-rgb), 0.5); }
        .constellation-card.inactive .constellation-badge { background: rgba(0,0,0,0.3); color: #64748b; }
        .constellation-effect { font-size: 0.8rem; line-height: 1.6; color: #94a3b8; max-height: 120px; overflow-y: auto; padding-right: 5px;}
        .constellation-card.activated .constellation-effect { color: #cbd5e1; }
        
        @media (max-width: 768px) { 
            .app-wrapper { height: auto; min-height: 100vh; padding: 12px; align-items: flex-start; }
            .app { flex-direction: column; height: auto; overflow: visible; } 
            .sidebar { width: 100%; height: 35vh; min-height: 300px; flex-shrink: 0; } 
            .detail-panel { padding: 16px; overflow: visible;} 
            .hero-card { padding: 20px; margin-bottom: 20px; }
            .hero-inner { flex-direction: column; text-align: center; align-items: center; justify-content: center; gap: 16px; }
            .hero-tags { justify-content: center; }
            .weapon-card { justify-content: center; text-align: left; }
            .relic-card { flex-direction: column; align-items: center; text-align: left; padding: 16px; } 
            .relic-info { width: 100%; }
            .relic-header { flex-direction: column; gap: 8px; align-items: flex-start; }
            .two-columns { flex-direction: column; gap: 20px; } 
            .stats-section { order: 1; } 
            .relics-section { order: 2; }
            .constellation-grid { grid-template-columns: 1fr; }
        }
        footer { margin-top: 40px; padding: 20px; text-align: center; font-size: 0.75rem; color: #475569; border-top: 1px solid rgba(255,255,255,0.05); }

        /* HUD Background from index */
        .hud-grid {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; pointer-events: none;
            background-image: linear-gradient(rgba(16, 185, 129, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(16, 185, 129, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="hud-grid"></div>
    <div id="particles-js" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;"></div>
    <div class="app-wrapper" style="position:relative; z-index:2;">
        <div class="app glass-panel">
            <div class="sidebar" style="border-right: 1px solid var(--glass-border);">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-address-card"></i> 虚空终端角色库</h2>
                <p id="charCount">0 位角色</p>
                <div style="margin-top: 12px;">
                    <a href="sync.html" style="color: var(--text-secondary); font-size: 0.8rem; text-decoration: none; margin-right: 10px; background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);"><i class="fa-solid fa-rotate"></i> 同步</a>
                    <a href="index.html" style="color: var(--text-secondary); font-size: 0.8rem; text-decoration: none; background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);"><i class="fa-solid fa-house"></i> 首页</a>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="检索角色档案 (Name)...">
            </div>
            <div class="character-list" id="characterList"></div>
        </div>
        <div class="detail-panel" id="detailPanel">
            <div class="empty-state">
                <div style="font-size: 48px; margin-bottom: 20px; color: var(--dendro-primary); text-shadow: 0 0 20px var(--dendro-bg-glow);"><i class="fa-solid fa-database"></i></div>
                <div style="font-size: 18px; font-weight: 500; color: #f1f5f9;">数据加载中或未同步</div>
                <div style="font-size: 14px; margin-top: 12px;"><a href="sync.html" style="color: var(--dendro-primary); text-decoration: none; border: 1px solid var(--dendro-primary); padding: 6px 15px; border-radius: 20px;">点击去同步数据</a></div>
            </div>
        </div>
    </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#10b981" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.4, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false } },
                "size": { "value": 4, "random": true, "anim": { "enable": true, "speed": 2, "size_min": 0.1, "sync": false } },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 1.5, "direction": "top", "random": true, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": { "detect_on": "canvas", "events": { "onhover": { "enable": false }, "onclick": { "enable": false }, "resize": true } },
            "retina_detect": true
        });

        const rawData = localStorage.getItem('genshinSyncData');
        const charactersData = rawData ? JSON.parse(rawData) : [];
        
        document.getElementById('charCount').textContent = `共收录 ${charactersData.length} 位角色档案`;

        const elementColors = {
            "风": "#34d399", "火": "#f87171", "水": "#60a5fa",
            "冰": "#93c5fd", "雷": "#c084fc", "岩": "#fbbf24", "草": "#10b981"
        };
        const elementRgbColors = {
            "风": "52, 211, 153", "火": "248, 113, 113", "水": "96, 165, 250",
            "冰": "147, 197, 253", "雷": "192, 132, 252", "岩": "251, 191, 36", "草": "16, 185, 129"
        };
        const elementThemes = {
            "风": { "primary": "#10b981", "primary_light": "#34d399", "primary_dark": "#059669" }, // Anemo/Dendro share green in this terminal
            "火": { "primary": "#ef4444", "primary_light": "#f87171", "primary_dark": "#b91c1c" },
            "水": { "primary": "#3b82f6", "primary_light": "#60a5fa", "primary_dark": "#1d4ed8" },
            "冰": { "primary": "#38bdf8", "primary_light": "#7dd3fc", "primary_dark": "#0284c7" },
            "雷": { "primary": "#a855f7", "primary_light": "#c084fc", "primary_dark": "#7e22ce" },
            "岩": { "primary": "#f59e0b", "primary_light": "#fbbf24", "primary_dark": "#b45309" },
            "草": { "primary": "#10b981", "primary_light": "#34d399", "primary_dark": "#059669" }
        };

        const propertyMap = {
            2: "生命值", 3: "生命值%", 4: "基础攻击力", 5: "攻击力", 6: "攻击力%", 7: "基础防御力", 8: "防御力", 9: "防御力%",
            20: "暴击率", 22: "暴击伤害", 23: "元素充能效率", 26: "治疗加成", 28: "元素精通", 30: "物理伤害加成",
            40: "火元素伤害加成", 41: "雷元素伤害加成", 42: "水元素伤害加成", 43: "草元素伤害加成", 44: "风元素伤害加成",
            45: "岩元素伤害加成", 46: "冰元素伤害加成", 2000: "生命值上限", 2001: "攻击力", 2002: "防御力"
        };
        
        function getElementColor(e) { return elementColors[e] || '#10b981'; }
        function getElementTheme(e) { return elementThemes[e] || elementThemes["草"]; }
        function getElementRgb(e) { return elementRgbColors[e] || '16, 185, 129'; }
        
        function setGlobalTheme(element) {
            const theme = getElementTheme(element);
            const rgb = getElementRgb(element);
            document.documentElement.style.setProperty('--theme-primary', theme.primary);
            document.documentElement.style.setProperty('--theme-primary-light', theme.primary_light);
            document.documentElement.style.setProperty('--theme-primary-dark', theme.primary_dark);
            document.documentElement.style.setProperty('--theme-primary-rgb', rgb);
            
            // Note: The rest is handled by CSS variables seamlessly!
        }
        
        function getRarityClass(r) { return r === 5 ? 'rarity-5' : 'rarity-4'; }
        function getRarityStars(r) { return r === 5 ? '★★★★★' : '★★★★'; }
        function getTimesClass(times) {
            if (times === 0) return 'sub-times-0';
            if (times === 1) return 'sub-times-1';
            if (times === 2) return 'sub-times-2';
            if (times === 3) return 'sub-times-3';
            if (times === 4) return 'sub-times-4';
            return 'sub-times-5';
        }
        function renderCharacterList(filterText) {
            filterText = filterText || '';
            const container = document.getElementById('characterList');
            const filtered = charactersData.filter(c => c.name.includes(filterText));
            container.innerHTML = filtered.map(char => `
                <div class="character-item" data-id="${char.id}">
                    <div class="char-avatar"><img src="${char.icon}" onerror="this.style.display='none'"></div>
                    <div class="char-info">
                        <div class="char-name">${char.name}</div>
                        <div class="char-element" style="color: ${getElementColor(char.element)}">${char.element}</div>
                        <div class="char-level">Lv.${char.level} · 好感${char.fetter} · 命座${char.constellation}/6</div>
                    </div>
                    <div class="char-rarity ${getRarityClass(char.rarity)}">${getRarityStars(char.rarity)}</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.character-item').forEach(el => {
                el.addEventListener('click', () => selectCharacter(parseInt(el.dataset.id)));
            });
        }
        
        function selectCharacter(charId) {
            document.querySelectorAll('.character-item').forEach(el => el.classList.remove('active'));
            const selectedEl = document.querySelector(`.character-item[data-id="${charId}"]`);
            if (selectedEl) {
                selectedEl.classList.add('active');
                selectedEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
            const char = charactersData.find(c => c.id === charId);
            if (char) {
                setGlobalTheme(char.element);
                renderDetailPanel(char);
            }
        }
        
        function getElementDamageName(element) {
            const names = { '火':'火元素伤害加成', '水':'水元素伤害加成', '风':'风元素伤害加成', '雷':'雷元素伤害加成', '草':'草元素伤害加成', '冰':'冰元素伤害加成', '岩':'岩元素伤害加成' };
            return names[element] || '元素伤害加成';
        }
        
        function renderDetailPanel(char) {
            const panel = document.getElementById('detailPanel');
            const elementDamageName = getElementDamageName(char.element);
            
            let relicsHtml = '';
            if (char.relics && char.relics.length > 0) {
                for (const relic of char.relics) {
                    let subsHtml = '';
                    if (relic.processed_subs && relic.processed_subs.length > 0) {
                        for (const sub of relic.processed_subs) {
                            subsHtml += `<div class="sub-row"><div class="sub-left"><span class="sub-name">${sub.prop_name}</span></div><div style="display:flex; align-items:center; gap:8px;"><span class="sub-value">+${sub.value}</span><span class="sub-times ${getTimesClass(sub.times)}">${sub.times > 0 ? '+' + sub.times : '+0'}</span></div></div>`;
                        }
                    }
                    if (subsHtml === '') subsHtml = '<div class="sub-row"><span style="color:#64748b;">暂无副词条</span></div>';

                    relicsHtml += `
                        <div class="relic-card">
                            <div class="relic-icon-area">
                                <img class="relic-icon" src="${relic.icon}" onerror="this.src='https://act-webstatic.mihoyo.com/hk4e/e20200928calculate/item_icon/67c7f6c8/placeholder.png'">
                            </div>
                            <div class="relic-info">
                                <div class="relic-header">
                                    <div>
                                        <span class="relic-name">${relic.name}</span>
                                        <span style="color: #64748b; margin-left: 5px; font-size: 0.8rem;">${relic.set?.name || '散件'}</span>
                                    </div>
                                    <span class="relic-pos">${relic.pos_name_cn}</span>
                                </div>
                                <div class="relic-main">
                                    <span class="main-label">主词条</span>
                                    <span class="main-value">${relic.main_prop_name} +${relic.main_prop_value}</span>
                                </div>
                                <div class="relic-subs">
                                    ${subsHtml}
                                </div>
                            </div>
                        </div>
                    `;
                }
            }
            if (relicsHtml === '') relicsHtml = '<div style="text-align:center; padding:40px; color:#64748b;">暂无圣遗物数据</div>';
            
            let setEffectsHtml = '';
            if (char.active_set_effects && char.active_set_effects.length > 0) {
                for (const effect of char.active_set_effects) {
                    setEffectsHtml += `<div class="set-effect-card"><div class="set-effect-title"><i class="fa-solid fa-layer-group"></i> ${effect.name} · ${effect.activation}件套效果</div><div class="set-effect-desc">${effect.effect}</div></div>`;
                }
            }
            
            let skillsHtml = '';
            if (char.skill_normal) skillsHtml += `<div class="skill-item"><span class="skill-name">🗡️ ${char.skill_normal.name || '普通攻击'}</span><span class="skill-level">Lv.${char.skill_normal.level || 1}</span></div>`;
            if (char.skill_e) skillsHtml += `<div class="skill-item"><span class="skill-name">⚡ ${char.skill_e.name || '元素战技'}</span><span class="skill-level">Lv.${char.skill_e.level || 1}</span></div>`;
            if (char.skill_q) skillsHtml += `<div class="skill-item"><span class="skill-name">✨ ${char.skill_q.name || '元素爆发'}</span><span class="skill-level">Lv.${char.skill_q.level || 1}</span></div>`;
            
            let statsHtml = '';
            const importantStats = [2000, 2001, 2002, 20, 22, 23, 28, 3, 6, 9];
            for (const st of importantStats) {
                if (char.stats[st]) {
                    statsHtml += `<div class="stat-row"><span class="stat-name">${propertyMap[st] || '未知'}</span><span class="stat-value">${char.stats[st].final}</span></div>`;
                }
            }
            if (char.element_damage && char.element_damage !== '0%') {
                statsHtml += `<div class="stat-row"><span class="stat-name">${elementDamageName}</span><span class="stat-value stat-highlight">${char.element_damage}</span></div>`;
            }
            
            let constellationsHtml = '';
            if (char.constellations && char.constellations.length > 0) {
                constellationsHtml = '<div class="constellations-section"><div class="section-title"><i class="fa-solid fa-star"></i> 命之座网络</div><div class="constellation-grid">';
                for (const cons of char.constellations) {
                    const activatedClass = cons.is_actived ? 'activated' : 'inactive';
                    const statusText = cons.is_actived ? '已激活' : '未解锁';
                    let effectText = cons.effect || '暂无描述';
                    effectText = effectText.replace(/<color[^>]*>/g, '').replace(/<\/?color>/g, '').replace(/\\n/g, '<br>');
                    constellationsHtml += `
                        <div class="constellation-card ${activatedClass}">
                            <div class="constellation-header">
                                <div class="constellation-icon"><i class="fa-solid fa-link"></i></div>
                                <div class="constellation-info">
                                    <div class="constellation-name">第${cons.pos}命 · ${cons.name}</div>
                                    <div class="constellation-badge">${statusText}</div>
                                </div>
                            </div>
                            <div class="constellation-effect">${effectText}</div>
                        </div>
                    `;
                }
                constellationsHtml += '</div></div>';
            } else {
                constellationsHtml = '<div class="constellations-section"><div class="section-title"><i class="fa-solid fa-star"></i> 命之座网络</div><div style="text-align:center; padding:40px; color:#64748b;">暂无命座数据</div></div>';
            }
            
            panel.innerHTML = `
                <div class="hero-card">
                    <div class="hero-inner">
                        <div class="hero-portrait"><img src="${char.portrait}" onerror="this.src='${char.icon}'"></div>
                        <div class="hero-info">
                            <div class="hero-name">${char.name}</div>
                            <div class="hero-tags">
                                <span class="element-tag"><i class="fa-solid fa-atom"></i> ${char.element}</span>
                                <span class="rarity-tag">${getRarityStars(char.rarity)}</span>
                                <span class="level-tag">Lv.${char.level}</span>
                                <span class="level-tag">命座 ${char.constellation}/6</span>
                            </div>
                            <div class="weapon-card">
                                <div class="weapon-icon"><img src="${char.weapon_icon}" onerror="this.style.display='none'"></div>
                                <div><div style="font-weight:700; font-size:1.1rem; color: #f8fafc;">${char.weapon_name}</div><div style="font-size:0.8rem; color:#94a3b8; margin-top: 4px;">Lv.${char.weapon_level} · 精炼 ${char.weapon_affix}</div></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="two-columns">
                    <div class="stats-section">
                        <div class="section-title"><i class="fa-solid fa-chart-pie"></i> 面板属性</div>
                        <div class="stats-card"><div class="stats-list">${statsHtml || '<div style="text-align:center; color:#64748b;">暂无数据</div>'}</div></div>
                        ${skillsHtml ? `<div class="skills-card"><div class="skills-title"><i class="fa-solid fa-bolt"></i> 核心天赋</div>${skillsHtml}</div>` : ''}
                    </div>
                    <div class="relics-section">
                        <div class="section-title"><i class="fa-solid fa-gem"></i> 圣遗物档案</div>
                        <div class="relics-list">${relicsHtml}</div>
                        ${setEffectsHtml}
                    </div>
                </div>
                ${constellationsHtml}
                <footer>Akasha Terminal Database | 数据来源：米哈游官方接口<br>System Version: 2.1 | UI Designed for Night Mode</footer>
            `;
        }
        
        document.getElementById('searchInput').addEventListener('input', function(e) {
            renderCharacterList(e.target.value);
        });
        
        if (charactersData.length > 0) {
            renderCharacterList('');
            selectCharacter(charactersData[0].id);
        }
    </script>
</body>
</html>
